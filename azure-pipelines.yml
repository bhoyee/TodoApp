trigger:
  branches:
    include:
      - main
      - dev
      - feature/*

pr:
  branches:
    include:
      - main
      - dev

parameters:
  - name: deployToAzure
    displayName: Deploy to Azure App Service
    type: boolean
    default: false

variables:
  buildConfiguration: Release
  azureServiceConnection: YOUR-AZURE-SERVICE-CONNECTION
  webAppName: YOUR-AZURE-WEB-APP-NAME
  smokeTestBaseUrl: ''
  appArtifactName: drop
  dockerArtifactName: docker-image

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build and publish artifact
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: 10.0.x

          - task: NodeTool@0
            displayName: Install Node.js
            inputs:
              versionSpec: 24.x

          - script: npm ci
            displayName: Restore frontend packages
            workingDirectory: src/TodoApp.Web

          - script: npm run test
            displayName: Run frontend component tests
            workingDirectory: src/TodoApp.Web

          - script: npm run build
            displayName: Build frontend
            workingDirectory: src/TodoApp.Web

          - task: DotNetCoreCLI@2
            displayName: Restore packages
            inputs:
              command: restore
              projects: TodoApp.sln

          - task: DotNetCoreCLI@2
            displayName: Build solution
            inputs:
              command: build
              projects: TodoApp.sln
              arguments: --configuration $(buildConfiguration) --no-restore

          - script: dotnet tool restore
            displayName: Restore repository tools

          - script: >-
              mkdir -p $(Build.ArtifactStagingDirectory)/database &&
              dotnet tool run dotnet-ef migrations script
              --idempotent
              --configuration $(buildConfiguration)
              --no-build
              --project src/TodoApp.Infrastructure/TodoApp.Infrastructure.csproj
              --startup-project src/TodoApp.Api/TodoApp.Api.csproj
              --output $(Build.ArtifactStagingDirectory)/database/migrations.sql
            displayName: Generate database migration script
            env:
              Database__Provider: SqlServer
              ConnectionStrings__TodoApp: Server=tcp:placeholder.database.windows.net,1433;Initial Catalog=TodoApp;User ID=placeholder;Password=placeholder;Encrypt=True;TrustServerCertificate=False;

          - task: DotNetCoreCLI@2
            displayName: Run automated tests
            inputs:
              command: test
              projects: tests/**/*.csproj
              arguments: >-
                --configuration $(buildConfiguration)
                --no-build
                --collect:"XPlat Code Coverage"
                --logger trx
                --results-directory $(Agent.TempDirectory)/test-results
              publishTestResults: true

          - task: PublishCodeCoverageResults@2
            displayName: Publish backend coverage
            inputs:
              summaryFileLocation: $(Agent.TempDirectory)/test-results/**/coverage.cobertura.xml

          - task: DotNetCoreCLI@2
            displayName: Publish app
            inputs:
              command: publish
              publishWebProjects: false
              projects: src/TodoApp.Api/TodoApp.Api.csproj
              arguments: >-
                --configuration $(buildConfiguration)
                --no-build
                --output $(Build.ArtifactStagingDirectory)
              zipAfterPublish: true

          - publish: $(Build.ArtifactStagingDirectory)
            displayName: Publish build artifact
            artifact: $(appArtifactName)

          - script: docker build -t todoapp:$(Build.BuildId) .
            displayName: Build Docker image

          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/docker
              docker save todoapp:$(Build.BuildId) -o $(Build.ArtifactStagingDirectory)/docker/todoapp-$(Build.BuildId).tar
            displayName: Package Docker image

          - publish: $(Build.ArtifactStagingDirectory)/docker
            displayName: Publish Docker artifact
            artifact: $(dockerArtifactName)

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    condition: and(succeeded(), eq(${{ parameters.deployToAzure }}, true))
    jobs:
      - deployment: DeployWebApp
        displayName: Deploy to Azure App Service
        environment: production
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: $(appArtifactName)

                - task: AzureWebApp@1
                  displayName: Deploy package
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: webAppLinux
                    appName: $(webAppName)
                    package: $(Pipeline.Workspace)/$(appArtifactName)/*.zip

                - pwsh: ./scripts/SmokeTest.ps1 -BaseUrl "$(smokeTestBaseUrl)"
                  displayName: Run deployment smoke test
                  condition: and(succeeded(), ne(variables['smokeTestBaseUrl'], ''))

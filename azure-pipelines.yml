trigger:
  branches:
    include:
      - main
      - dev
      - feature/*

pr:
  branches:
    include:
      - main
      - dev

parameters:
  - name: deployToAzure
    displayName: Deploy to Azure App Service
    type: boolean
    default: false

variables:
  buildConfiguration: Release
  azureServiceConnection: YOUR-AZURE-SERVICE-CONNECTION
  webAppName: YOUR-AZURE-WEB-APP-NAME

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build and publish artifact
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: 10.0.x

          - task: NodeTool@0
            displayName: Install Node.js
            inputs:
              versionSpec: 24.x

          - script: npm ci
            displayName: Restore frontend packages
            workingDirectory: src/TodoApp.Web

          - script: npm run test
            displayName: Run frontend component tests
            workingDirectory: src/TodoApp.Web

          - script: npm run build
            displayName: Build frontend
            workingDirectory: src/TodoApp.Web

          - task: DotNetCoreCLI@2
            displayName: Restore packages
            inputs:
              command: restore
              projects: TodoApp.sln

          - task: DotNetCoreCLI@2
            displayName: Build solution
            inputs:
              command: build
              projects: TodoApp.sln
              arguments: --configuration $(buildConfiguration) --no-restore

          - task: DotNetCoreCLI@2
            displayName: Run automated tests
            inputs:
              command: test
              projects: tests/**/*.csproj
              arguments: >-
                --configuration $(buildConfiguration)
                --no-build
                --collect:"XPlat Code Coverage"
                --logger trx
              publishTestResults: true

          - task: DotNetCoreCLI@2
            displayName: Publish app
            inputs:
              command: publish
              publishWebProjects: false
              projects: src/TodoApp.Api/TodoApp.Api.csproj
              arguments: >-
                --configuration $(buildConfiguration)
                --no-build
                --output $(Build.ArtifactStagingDirectory)
              zipAfterPublish: true

          - publish: $(Build.ArtifactStagingDirectory)
            displayName: Publish build artifact
            artifact: drop

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    condition: and(succeeded(), eq(${{ parameters.deployToAzure }}, true))
    jobs:
      - deployment: DeployWebApp
        displayName: Deploy to Azure App Service
        environment: production
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop

                - task: AzureWebApp@1
                  displayName: Deploy package
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: webAppLinux
                    appName: $(webAppName)
                    package: $(Pipeline.Workspace)/drop/*.zip

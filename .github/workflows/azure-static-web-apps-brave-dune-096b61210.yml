name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    env:
      SWA_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Validate deployment token
        shell: bash
        run: |
          if [ -z "$SWA_DEPLOYMENT_TOKEN" ]; then
            echo "::error::Static Web Apps deployment token is missing. Add a repository secret named AZURE_STATIC_WEB_APPS_API_TOKEN."
            exit 1
          fi
          echo "Static Web Apps token fingerprint:"
          echo -n "$SWA_DEPLOYMENT_TOKEN" | sha256sum | cut -c1-16

      - name: Build and deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/Taskora.Web
          api_location: ''
          output_location: dist
          app_build_command: npm run build

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    env:
      SWA_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - name: Validate deployment token
        shell: bash
        run: |
          if [ -z "$SWA_DEPLOYMENT_TOKEN" ]; then
            echo "::error::Static Web Apps deployment token is missing. Add a repository secret named AZURE_STATIC_WEB_APPS_API_TOKEN."
            exit 1
          fi

      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN }}
          action: close
